<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Eagle Data Exporter</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="../shared/liquid-glass.css">
    <style>
        /* Plugin-specific: remap shared tokens to short aliases */
        :root {
            --accent: var(--lg-accent);
            --accent-solid: var(--lg-accent-solid);
            --accent-hover: var(--lg-accent-hover);
        }
        .page-title {
            margin-bottom: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="page-title" data-lg-tip="将选中或全部素材导出为 JSON / CSV；JSON 下可打包图片为 ZIP 或 Base64。">Eagle Data Exporter</h1>
        
        <div id="itemCount" class="info-box" style="display: none;" role="status" data-lg-tip="当前选择范围与资料库规模">
            <span id="countText"></span>
        </div>
        
        <div class="section">
            <div class="section-title" data-lg-tip="勾选要写入导出文件的字段">字段</div>
            <div class="field-grid">
                <div class="field-item" data-lg-tip="Name · 素材标题" onclick="toggleField('name')">
                    <input type="checkbox" id="field_name" checked>
                    <label for="field_name">名称</label>
                </div>
                <div class="field-item" data-lg-tip="原始链接或来源地址" onclick="toggleField('url')">
                    <input type="checkbox" id="field_url" checked>
                    <label for="field_url">URL</label>
                </div>
                <div class="field-item" data-lg-tip="Modified · 最近修改时间" onclick="toggleField('mtime')">
                    <input type="checkbox" id="field_mtime" checked>
                    <label for="field_mtime">修改时间</label>
                </div>
                <div class="field-item" data-lg-tip="Annotation · 备注与说明" onclick="toggleField('annotation')">
                    <input type="checkbox" id="field_annotation">
                    <label for="field_annotation">注释</label>
                </div>
            </div>
            
            <a class="field-toggle" href="#" onclick="toggleMoreFields(); return false;" data-lg-tip="大小、扩展名、文件夹、标签、路径、宽高、色板等 8 项">
                <span class="field-toggle-icon" id="moreFieldsIcon">▶</span>
                <span id="moreFieldsText">更多字段</span>
            </a>
            
            <div class="more-fields" id="moreFieldsContainer">
                <div class="field-grid" style="margin-top: 10px;">
                    <div class="field-item" data-lg-tip="Size" onclick="toggleField('size')">
                        <input type="checkbox" id="field_size">
                        <label for="field_size">大小</label>
                    </div>
                    <div class="field-item" data-lg-tip="Extension" onclick="toggleField('ext')">
                        <input type="checkbox" id="field_ext">
                        <label for="field_ext">扩展名</label>
                    </div>
                    <div class="field-item" data-lg-tip="Folders" onclick="toggleField('folders')">
                        <input type="checkbox" id="field_folders">
                        <label for="field_folders">文件夹</label>
                    </div>
                    <div class="field-item" data-lg-tip="Tags" onclick="toggleField('tags')">
                        <input type="checkbox" id="field_tags">
                        <label for="field_tags">标签</label>
                    </div>
                    <div class="field-item" data-lg-tip="File Path" onclick="toggleField('filePath')">
                        <input type="checkbox" id="field_filePath">
                        <label for="field_filePath">文件路径</label>
                    </div>
                    <div class="field-item" data-lg-tip="Width" onclick="toggleField('width')">
                        <input type="checkbox" id="field_width">
                        <label for="field_width">宽度</label>
                    </div>
                    <div class="field-item" data-lg-tip="Height" onclick="toggleField('height')">
                        <input type="checkbox" id="field_height">
                        <label for="field_height">高度</label>
                    </div>
                    <div class="field-item" data-lg-tip="Color Palette" onclick="toggleField('palettes')">
                        <input type="checkbox" id="field_palettes">
                        <label for="field_palettes">色板</label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title" data-lg-tip="导出当前选中项，或资料库内全部素材">来源</div>
            <div class="source-selector">
                <button type="button" class="source-btn active" id="source_selected" onclick="selectSource('selected')" data-lg-tip="仅导出当前在 Eagle 中选中的素材">
                    已选
                </button>
                <button type="button" class="source-btn" id="source_all" onclick="selectSource('all')" data-lg-tip="导出资料库中全部素材（数据量大时请谨慎）">
                    全部
                </button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title" data-lg-tip="JSON 适合程序处理；CSV 适合表格软件">格式</div>
            <div class="format-selector">
                <button type="button" class="format-btn active" id="format_json" onclick="selectFormat('json')" data-lg-tip="结构化数据，可附带图片（ZIP / Base64）">
                    JSON
                </button>
                <button type="button" class="format-btn" id="format_csv" onclick="selectFormat('csv')" data-lg-tip="表格友好，不含嵌套图片">
                    CSV
                </button>
            </div>
        </div>
        
        <div class="section" id="imageExportSection">
            <div class="section-title" data-lg-tip="仅 JSON 导出时有效">图片</div>
            <div class="format-selector">
                <button type="button" class="format-btn" id="image_none" onclick="selectImageMode('none')" data-lg-tip="JSON 中不包含图片二进制或文件">
                    不含图
                </button>
                <button type="button" class="format-btn" id="image_base64" onclick="selectImageMode('base64')" data-lg-tip="将图片以 Base64 写入 JSON，体积会明显增大，仅建议少量小图">
                    Base64
                </button>
                <button type="button" class="format-btn active" id="image_package" onclick="selectImageMode('package')" data-lg-tip="导出 ZIP，内含图片文件与 JSON 元数据">
                    ZIP 包
                </button>
            </div>
            
            <div id="thumbnailOption" style="margin-top: 12px; display: flex;">
                <div class="field-item" data-lg-tip="在 ZIP 中额外包含 Eagle 生成的缩略图" onclick="toggleThumbnailExport()" style="width: 100%;">
                    <input type="checkbox" id="export_thumbnail" checked>
                    <label for="export_thumbnail">含缩略图</label>
                </div>
            </div>
        </div>
        
        <button type="button" class="export-btn" onclick="handleExport()" data-lg-tip="按当前选项开始导出">
            <span id="exportBtnText">导出</span>
        </button>
    </div>
    
    <div class="toast" id="toast"></div>
    <div id="lg-tooltip" role="tooltip"></div>
    
    <script type="text/javascript" src="js/plugin.js"></script>
</body>
</html>
